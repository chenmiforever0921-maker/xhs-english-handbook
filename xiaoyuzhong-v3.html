<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小语种赛道 内容方向手册 v3</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#B5625A;--primary-light:#fdf3f2;--bg:#FAF9F7;--card:#FFF;--border:#EBEBEB;--text:#1A1A1A;--text2:#555;--text3:#888}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text)}
h1,.persona-name,.section-title{font-family:Georgia,serif}
/* Header */
header{background:#fff;border-bottom:1px solid var(--border);padding:48px 0}
.header-inner{max-width:1100px;margin:0 auto;padding:0 40px;display:flex;justify-content:space-between;align-items:flex-start}
.header-title{font-family:Georgia,serif;font-size:36px;font-weight:700;color:#1A1A1A;line-height:1.25;margin-bottom:12px}
.header-sub{font-size:14px;color:#888;line-height:1.6}
.header-badge{flex-shrink:0;text-align:center;padding:20px 24px;border:2px solid #B5625A;border-radius:12px}
.header-badge-num{font-family:Georgia,serif;font-size:48px;font-weight:700;color:#B5625A;line-height:1}
.header-badge-label{font-size:11px;color:#B5625A;letter-spacing:2px;margin-top:4px}
.formula-bar{max-width:1100px;margin:0 auto;padding:0 40px}
.formula-bar-inner{background:#fff8f6;border-left:3px solid #B5625A;padding:10px 20px;font-size:13px;color:#555;margin-top:16px}
/* Nav */
.top-nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);padding:0;display:flex;align-items:center;height:52px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.nav-logo{font-family:Georgia,serif;font-size:16px;font-weight:700;color:var(--primary);margin-right:32px;white-space:nowrap}
.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{padding:0 18px;height:52px;line-height:52px;font-size:14px;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.nav-tab:hover{color:var(--primary)}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
/* Main */
.main{max-width:1100px;margin:0 auto;padding:24px 16px 60px}
.screen{display:none}.screen.active{display:block}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--primary)}
.section-title{font-size:20px;font-weight:700;color:var(--text)}
.section-count{font-size:13px;color:var(--text3);background:#f0eeec;padding:2px 10px;border-radius:20px}
.group-label-bar{grid-column:1/-1;padding:4px 0 8px;font-size:13px;font-weight:600;color:#B5625A;border-bottom:1px solid #f0ebe6;margin-bottom:4px}
.group-label{font-size:12px;font-weight:600;color:var(--primary);background:var(--primary-light);padding:4px 12px;border-radius:4px;display:inline-block;margin-bottom:16px;letter-spacing:.5px}
.persona-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.persona-grid{grid-template-columns:1fr}}
/* Persona card - modal mode */
.persona-card{background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s;cursor:pointer}
.persona-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.persona-head{padding:16px 18px;background:#fff;transition:background .15s;position:relative}
.persona-head:hover{background:#fafafa}
.persona-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px}
.persona-desc{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.persona-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid;white-space:nowrap}
.tag-drive{color:#722ED1;border-color:#d3adf7;background:#f9f0ff}
.tag-intent-high{color:#389e0d;border-color:#b7eb8f;background:#f6ffed}
.tag-intent-mid{color:#D46B08;border-color:#ffd591;background:#fff7e6}
.tag-intent-low{color:#8c8c8c;border-color:#d9d9d9;background:#fafafa}
.card-hint{position:absolute;bottom:10px;right:14px;font-size:12px;color:var(--primary);opacity:.7}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto}
.modal-overlay.open{display:block}
.modal-box{background:#fff;border-radius:12px;max-width:800px;margin:40px auto;padding:32px;position:relative;max-height:calc(100vh - 80px);overflow-y:auto}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:none;background:#f5f3f0;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555;transition:all .15s}
.modal-close:hover{background:#e8e4e0;color:#333}
.modal-persona-name{font-family:Georgia,serif;font-size:24px;font-weight:700;margin-bottom:4px}
.modal-persona-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.modal-persona-desc{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.modal-divider{height:1px;background:var(--border);margin:0 0 24px}
.modal-direction{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.modal-direction:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.modal-dir-head{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.modal-dir-title{font-size:16px;font-weight:700;color:var(--text)}
.dir-badge{font-size:11px;padding:2px 10px;border-radius:20px;white-space:nowrap}
.badge-star{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.badge-opp{background:#fff8e1;color:#8d6e23;border:1px solid #ffe082}
.badge-valley{background:#fdf3f2;color:#a0413a;border:1px solid #f0c4c0}
.modal-dir-cta{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7;padding-left:12px;border-left:2px solid #f0eeec}
.notes-section-label{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.notes-label-client{color:#B5625A}
.notes-label-ugc{color:#888}
.client-notes-scroll{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:thin}
.client-notes-scroll::-webkit-scrollbar{height:4px}
.client-notes-scroll::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
.client-note-card{text-decoration:none;color:inherit;display:block;background:#fff;border:1px solid #ebebeb;border-radius:8px;overflow:hidden;width:155px;flex-shrink:0;transition:box-shadow .15s}
.client-note-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.client-note-card img{width:100%;height:100px;object-fit:cover;display:block}
.client-note-fallback{width:100%;height:100px;background:#f5f3f0;display:flex;align-items:center;justify-content:center;font-size:24px}
.client-note-info{padding:8px}
.client-note-title{font-size:11px;color:#1a1a1a;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.client-note-metrics{display:flex;flex-wrap:wrap;gap:3px}
.client-note-metric{font-size:10px;padding:1px 5px;border-radius:3px}
.ugc-notes-list{display:flex;flex-direction:column;gap:6px}
.ugc-note-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f9f8f6;border-radius:6px;text-decoration:none;color:inherit;transition:background .15s}
.ugc-note-item:hover{background:#f0eeec}
.ugc-note-icon{font-size:14px;flex-shrink:0}
.ugc-note-title{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ugc-note-read{font-size:11px;color:var(--text3);white-space:nowrap}
.ugc-note-empty{font-size:12px;color:#bbb;font-style:italic}
/* Quadrant */
.quadrant-wrap{width:100%;margin-bottom:24px}
.quadrant-container{position:relative;width:100%;overflow:hidden;border:1px solid #ebebeb;border-radius:8px;background:#fff}
#quadrant-chart{width:100%;height:500px;display:block}
.quadrant-tooltip{position:absolute;display:none;background:rgba(0,0,0,.75);color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;pointer-events:none;max-width:200px;line-height:1.6;z-index:10}
.legend-bar{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px;font-size:12px}
.legend-item{display:flex;align-items:center;gap:6px;color:var(--text3)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.priority-board{background:var(--card);border-radius:8px;border:1px solid var(--border);padding:20px}
.priority-title{font-family:Georgia,serif;font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.priority-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.priority-grid{grid-template-columns:1fr}}
.priority-item{padding:14px 16px;border-radius:8px;border:1px solid}
.priority-hot{background:#fdf3f2;border-color:#f0c4c0}
.priority-high{background:#e8f5e9;border-color:#a5d6a7}
.priority-mid{background:#fff8e1;border-color:#ffe082}
.priority-item-title{font-family:Georgia,serif;font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text)}
.priority-item-desc{font-size:12px;color:var(--text2);line-height:1.5}
.priority-item-covers{font-size:12px;color:var(--text3);margin-top:6px;padding-top:6px;border-top:1px solid rgba(0,0,0,.06)}

</style>
</head>

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function intentLabel(i){return{high:["tag-intent-high","\u9ad8\u610f\u5411"],mid:["tag-intent-mid","\u4e2d\u610f\u5411"],low:["tag-intent-low","\u4f4e\u610f\u5411"]}[i]||["",""]}
function badgeClass(b){return{star:"badge-star",opp:"badge-opp",valley:"badge-valley",low:"badge-low"}[b]||"badge-low"}

function renderCard(p){
  var d='<div class="persona-card" data-pid="'+p.id+'">';
  d+='<div class="persona-head">';
  d+='<div class="persona-name">'+esc(p.name)+'</div>';
  d+='<div class="persona-desc">'+esc(p.desc)+'</div>';
  d+='<div class="persona-tags">';
  p.drives.forEach(function(dr){d+='<span class="tag tag-drive">'+esc(dr)+'</span>'});
  var il=intentLabel(p.intent);
  d+='<span class="tag '+il[0]+'">'+il[1]+'</span>';
  d+='</div>';
  d+='<div class="card-hint">\u67e5\u770b\u5185\u5bb9\u65b9\u5411 \u2192</div>';
  d+='</div></div>';
  return d;
}

function renderGrid(el,personas){
  if(!el)return;
  var d='',lastGroup='';
  var groupNames={};
  personas.forEach(function(p){groupNames[p.group]=p.groupName;});
  personas.forEach(function(p){
    if(p.group!==lastGroup){lastGroup=p.group;d+='<div class="group-label-bar">'+esc(groupNames[p.group])+'</div>';}
    d+=renderCard(p);
  });
  el.innerHTML='<div class="persona-grid">'+d+'</div>';
}

document.addEventListener('click',function(e){
  var card=e.target.closest('.persona-card');
  if(card){openModal(card.dataset.pid);}
  else if(e.target.id==='modal-overlay'||e.target.id==='modal-close'){closeModal();}
});

function openModal(pid){
  var p=PERSONAS.find(function(x){return x.id===pid});
  if(!p)return;
  document.getElementById('modal-persona-name').textContent=p.name;
  var th='';
  p.drives.forEach(function(dr){th+='<span class="tag tag-drive">'+esc(dr)+'</span>'});
  var il=intentLabel(p.intent);th+='<span class="tag '+il[0]+'">'+il[1]+'</span>';
  document.getElementById('modal-persona-tags').innerHTML=th;
  document.getElementById('modal-persona-desc').textContent=p.desc;

  var dh='';
  p.directions.forEach(function(dir,idx){
    dh+='<div class="modal-direction">';
    dh+='<div class="modal-dir-head"><div class="modal-dir-title">'+esc(dir.title)+'</div>';
    if(dir.badge) dh+='<div class="dir-badge '+badgeClass(dir.badge)+'">'+esc(dir.badgeText)+'</div>';
    dh+='</div>';
    dh+='<div class="modal-dir-cta">'+esc(dir.cta)+'</div>';
    dh+='</div>';
  });
  document.getElementById('modal-directions').innerHTML=dh;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

document.querySelectorAll('.nav-tab').forEach(function(tab){
  tab.addEventListener('click',function(){
    document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('active');});
    document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
    this.classList.add('active');
    document.getElementById('screen-'+this.dataset.tab).classList.add('active');
  });
});

var jaList=PERSONAS.filter(function(p){return p.lang==='ja';});
var krList=PERSONAS.filter(function(p){return p.lang==='kr';});
var euList=PERSONAS.filter(function(p){return p.lang==='eu';});
renderGrid(document.getElementById('screen-all'),PERSONAS);
renderGrid(document.getElementById('screen-ja'),jaList);
renderGrid(document.getElementById('screen-kr'),krList);
renderGrid(document.getElementById('screen-eu'),euList);
document.getElementById('screen-all').classList.add('active');
</script>
